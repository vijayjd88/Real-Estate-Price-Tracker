<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Estate Price Tracker – Chennai & Bangalore</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Real Estate Price Tracker</h1>
      <p class="tagline">Chennai & Bangalore – find areas that fit your budget</p>
    </header>

    <section class="filters">
      <div class="filter-group">
        <span class="filter-label">City</span>
        <div class="city-tabs">
          <button type="button" class="tab active" data-city="">All</button>
          <button type="button" class="tab" data-city="chennai">Chennai</button>
          <button type="button" class="tab" data-city="bangalore">Bangalore</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Budget (Lakhs)</span>
        <div class="budget-inputs">
          <input type="number" id="budget-min" placeholder="Min" min="0" step="10" aria-label="Minimum budget in lakhs">
          <span class="range-sep">–</span>
          <input type="number" id="budget-max" placeholder="Max" min="0" step="10" aria-label="Maximum budget in lakhs">
        </div>
      </div>
    </section>

    <main>
      <section class="section best-investment">
        <h2>Best Investment options</h2>
        <p class="section-hint">Areas with value below city average (top 12)</p>
        <div id="best-cards" class="cards"></div>
      </section>

      <section class="section all-areas">
        <h2>All areas</h2>
        <div id="areas-wrap">
          <table class="areas-table" aria-label="All areas with price details">
            <thead>
              <tr>
                <th>Locality</th>
                <th>City</th>
                <th>₹/sq ft</th>
                <th>Price range (Lakhs)</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="areas-tbody"></tbody>
          </table>
          <div class="pagination" id="pagination"></div>
        </div>
      </section>
    </main>

    <div id="loading" class="loading" hidden>Loading…</div>
    <div id="error" class="error" hidden></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
